<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    :root { --c: #1c1b0f; }
    @media (prefers-color-scheme: dark) { :root { --c: #ede8d4; } }
  </style>
  <defs>
    <mask id="m">
      <!-- White = visible; black rect = hairline cut that shows through to background -->
      <rect width="200" height="200" fill="white"/>
      <rect x="16" y="97" width="139" height="6" fill="black"/>
    </mask>
  </defs>
  <g mask="url(#m)" fill="var(--c)">
    <!-- Left shape: small reversed-D, semicircle center (68,100) radius 52 -->
    <path d="M 68 48 L 68 152 A 52 52 0 0 0 68 48 Z"/>
    <!-- Right shape: large reversed-D + rectangle, circle center (88,100) radius 72 -->
    <path d="M 88 28 A 72 72 0 0 0 88 172 L 184 172 L 184 28 Z"/>
  </g>
</svg>
